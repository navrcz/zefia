<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Děkujeme – ZEFIA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #0C0C0E;
  color: #E8E6E1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
.content { position: relative; z-index: 1; }
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 22px; font-weight: 700;
  letter-spacing: 4px;
  color: #F0C932;
  text-decoration: none;
  display: block;
  margin-bottom: 56px;
}
.icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: rgba(240, 201, 50, 0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 28px;
}
h1 {
  font-size: 34px; font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 14px;
}
p {
  font-size: 17px;
  color: #8A8A8F;
  max-width: 440px;
  line-height: 1.7;
  margin-bottom: 40px;
}
p strong { color: #E8E6E1; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 15px 30px; border-radius: 10px;
  font-size: 15px; font-weight: 600;
  text-decoration: none;
  background: #F0C932; color: #0C0C0E;
  transition: all 0.25s;
  box-shadow: 0 0 30px rgba(240, 201, 50, 0.15);
}
.btn:hover {
  background: #FFD84D;
  transform: translateY(-2px);
  box-shadow: 0 0 50px rgba(240, 201, 50, 0.25);
}
</style>
</head>
<body>
<div class="content">
  <a href="/" class="logo">ZEFIA</a>
  <div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#F0C932" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 12 10 16 18 8"/></svg></div>
  <h1>Děkujeme za poptávku!</h1>
  <p>Vaši zprávu jsme přijali a ozveme se vám zpět do 24 hodin. Pokud je to urgentní, zavolejte na <strong>+420 608 477 478</strong>.</p>
  <a href="/" class="btn">Zpět na úvodní stránku</a>
</div>
</body>
</html>
